pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = "https://maven.fabricmc.net/" }
        maven { url = "https://maven.kikugie.dev/releases" }
        maven { url = "https://maven.kikugie.dev/snapshots" }
    }
}

plugins {
    id "dev.kikugie.stonecutter" version "0.8"
}

stonecutter {
    create(rootProject) {
        // Minecraft versions this mod is built for.
        // 26.x (year-based) entries are scaffolded but require their own
        // mapping/loom coordinates in build.gradle once those APIs are pinned.
        versions("1.20.1", "1.20.4", "1.20.6", "1.21.1", "1.21.4")
        vcsVersion = "1.21.1"
    }
}

rootProject.name = "Quark"
