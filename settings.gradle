pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = "https://maven.fabricmc.net/" }
        maven { url = "https://maven.kikugie.dev/releases" }
        maven { url = "https://maven.kikugie.dev/snapshots" }
    }
}

plugins {
    id "dev.kikugie.stonecutter" version "0.8"
}

stonecutter {
    create(rootProject) {
        // Minecraft versions this mod is built for.
        // Verify yarn/loader/fabric-api coordinates at https://fabricmc.net/develop
        // before building each version. Year-based (25.x, 26.x) entries need their
        // own mapping coordinates added to build.gradle once pinned.
        versions("1.20.1", "1.20.4", "1.20.6", "1.21.1", "1.21.3", "1.21.4", "1.21.5")
        vcsVersion = "1.21.1"
    }
}

rootProject.name = "Quark"
