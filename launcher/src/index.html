<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https://cdn.discordapp.com data:; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Quark Client</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Custom title bar -->
  <div id="titlebar">
    <div class="tb-left">
      <div class="tb-logo-mark"></div>
      <span class="tb-logo">QUARK</span>
      <span class="tb-badge" id="tb-version">v2.0</span>
    </div>
    <div class="tb-spacer"></div>
    <div class="tb-center-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
    <div class="tb-spacer"></div>
    <div id="tb-auto-inject-indicator" class="tb-auto hidden">
      <span class="tb-auto-dot"></span>AUTO-INJECT ON
    </div>
    <div class="tb-controls">
      <button class="win-btn" id="btn-min" title="Minimise">─</button>
      <button class="win-btn" id="btn-max" title="Maximise">□</button>
      <button class="win-btn close" id="btn-close" title="Close">✕</button>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="screen-login" class="screen active">
    <canvas id="particle-canvas"></canvas>
    <div class="login-glow"></div>

    <div class="login-card">
      <div class="login-logo-wrap">
        <div class="login-logo-mark"></div>
        <div class="login-logo">QUARK</div>
        <div class="login-tagline">Ghost Client · 1671 Modules · JVM Injection</div>
      </div>

      <button class="btn-discord" id="btn-discord-login">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Sign in with Discord
      </button>

      <div class="divider"><span>or</span></div>

      <a class="skip-link" id="btn-skip">Continue as Guest</a>

      <p class="legal">For authorized use only · Not affiliated with Mojang</p>
    </div>

    <div id="oauth-overlay" class="hidden">
      <div class="oauth-card">
        <div class="spinner"></div>
        <p>Awaiting Discord authorisation…</p>
        <a id="btn-cancel-oauth">Cancel</a>
      </div>
    </div>
  </div>

  <!-- MAIN APP SHELL -->
  <div id="screen-main" class="screen">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div id="nav-list">
        <div class="nav-section-label">Main</div>
        <button class="nav-item active" data-page="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </button>
        <button class="nav-item" data-page="news">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-2 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          News
          <span class="nav-badge">New</span>
        </button>

        <div class="nav-sep"></div>
        <div class="nav-section-label">Injection</div>

        <button class="nav-item" data-page="inject">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Inject
        </button>
        <button class="nav-item" data-page="modules">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Modules
        </button>
        <button class="nav-item" data-page="keybinds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
          Keybinds
        </button>

        <div class="nav-sep"></div>
        <div class="nav-section-label">Tools</div>

        <button class="nav-item" data-page="servers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          Servers
        </button>
        <button class="nav-item" data-page="profiles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profiles
        </button>
        <button class="nav-item" data-page="alts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Alt Manager
        </button>
        <button class="nav-item" data-page="stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Statistics
        </button>

        <div class="nav-sep"></div>
        <div class="nav-section-label">Community</div>

        <button class="nav-item" data-page="chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Global Chat
        </button>
        <button class="nav-item" data-page="changelog">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Changelog
        </button>

        <div class="nav-sep"></div>

        <button class="nav-item staff-only hidden" data-page="staff">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
          Staff Panel
          <span class="nav-badge staff-badge">Staff</span>
        </button>
        <button class="nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M20 12h-1M5 12H4M17.66 5.34l-1.41 1.41M6.76 17.24l-1.41 1.41M12 4V3M12 21v-1"/></svg>
          Settings
        </button>
      </div>

      <div class="sidebar-bottom">
        <div id="user-row"></div>
      </div>
    </nav>

    <!-- Content area -->
    <main id="content"></main>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
